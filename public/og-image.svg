<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1a13"/>
      <stop offset="100%" style="stop-color:#1a3d20"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="120" cy="80" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="350" cy="50" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="580" cy="90" r="2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="800" cy="40" r="1.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="1050" cy="70" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="950" cy="120" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <!-- Pine tree icon -->
  <g transform="translate(540, 180)">
    <polygon points="60,0 0,80 120,80" fill="#4ade80"/>
    <polygon points="60,40 10,110 110,110" fill="#22c55e"/>
    <polygon points="60,80 15,150 105,150" fill="#16a34a"/>
    <rect x="47" y="150" width="26" height="30" fill="#92400e"/>
  </g>
  <!-- CamperWatch text -->
  <text x="600" y="400" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">CamperWatch</text>
  <!-- Tagline -->
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="28" fill="#fbbf24" text-anchor="middle">Find campgrounds across the US</text>
  <!-- URL -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.4)" text-anchor="middle">camperwatch.org</text>
</svg>